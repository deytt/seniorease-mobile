name: Mobile CI/CD

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    name: CI — Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  distribute:
    name: CD — Build & Distribute APK
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Read version from pubspec
        id: version
        run: |
          VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Build APK (release)
        run: >-
          flutter build apk --release
          --build-name=${{ steps.version.outputs.name }}
          --build-number=${{ github.run_number }}

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: seniorease-testers
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: |
            Versão: ${{ steps.version.outputs.name }} (${{ github.run_number }})
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Autor: ${{ github.actor }}
